<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e150e"/>
      <stop offset="100%" style="stop-color:#1a221a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4be277"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.2"/>
  <g transform="translate(256,256)">
    <!-- Dumbbell icon -->
    <rect x="-80" y="-12" width="160" height="24" rx="12" fill="url(#glow)"/>
    <rect x="-110" y="-36" width="36" height="72" rx="8" fill="url(#glow)"/>
    <rect x="74" y="-36" width="36" height="72" rx="8" fill="url(#glow)"/>
    <rect x="-124" y="-28" width="20" height="56" rx="6" fill="#22c55e"/>
    <rect x="104" y="-28" width="20" height="56" rx="6" fill="#22c55e"/>
  </g>
  <!-- Pulse line -->
  <polyline points="100,340 180,340 210,280 240,400 270,300 300,340 340,340 370,310 412,340" 
            fill="none" stroke="#4be277" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
