<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e150e" />
  <title>FitLife — Maintenance</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#0e150e;color:#dce5d9;font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100dvh}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
    .icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#22c55e,#4be277);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 12px 40px rgba(34,197,94,.25)}
    h1{font-size:24px;font-weight:800;margin:0 0 8px}
    p{color:#bccbb9;font-size:14px;line-height:1.55;max-width:380px;margin:0 0 24px}
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .note{font-size:12px;color:#869585;border-top:1px solid rgba(188,203,185,.12);margin-top:24px;padding-top:16px}
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="icon pulse" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#003915"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9C10 1 7 .5 4.7 1.4l4 4-3.3 3.3-4-4C.5 7 1 10 3 12c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.4-.4.4-1 0-1.3z"/></svg>
    </div>
    <h1>We'll be back shortly</h1>
    <p>FitLife is currently undergoing scheduled maintenance to bring you a better experience. Thank you for your patience.</p>
    <div class="note">Need help? Contact <strong>support@fitlife.app</strong></div>
  </main>
</body>
</html>
