<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e150e" />
  <title>FitLife — Page Not Found</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:#0e150e;color:#dce5d9;font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100dvh}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
    .logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#22c55e,#4be277);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 12px 40px rgba(34,197,94,.25)}
    h1{font-size:36px;font-weight:800;margin:0 0 4px}
    h2{font-size:18px;font-weight:600;margin:0 0 12px;color:#bccbb9}
    p{color:#bccbb9;font-size:14px;line-height:1.55;max-width:340px;margin:0 0 24px}
    .btn{appearance:none;border:0;cursor:pointer;background:#22c55e;color:#003915;font-weight:700;font-size:14px;border-radius:999px;padding:13px 28px;min-height:44px;text-decoration:none;display:inline-block;transition:transform .15s ease, box-shadow .25s ease}
    .btn:hover{box-shadow:0 12px 30px rgba(34,197,94,.3)}
    .btn:active{transform:scale(.97)}
    .btn-ghost{background:transparent;color:#bccbb9;border:1px solid rgba(188,203,185,.2)}
    .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#003915"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    </div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>This page doesn't exist or has been moved. Let's get you back to your dashboard.</p>
    <div class="row">
      <a href="/#/dashboard" class="btn">Go to Dashboard</a>
      <a href="/" class="btn btn-ghost">Home</a>
    </div>
  </main>
  <script>
    // If user landed here via Vercel 404, redirect to SPA after 1s
    setTimeout(function(){ if (location.pathname !== '/') location.replace('/#' + location.pathname); }, 1500);
  </script>
</body>
</html>
