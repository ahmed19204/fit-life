<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e150e" />
  <title>FitLife — You're Offline</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:#0e150e;color:#dce5d9;font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;min-height:100dvh}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
    .logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#22c55e,#4be277);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 12px 40px rgba(34,197,94,.25)}
    h1{font-size:24px;margin:0 0 8px;font-weight:800}
    p{color:#bccbb9;font-size:14px;line-height:1.55;max-width:340px;margin:0 0 24px}
    button{appearance:none;border:0;cursor:pointer;background:#22c55e;color:#003915;font-weight:700;font-size:14px;border-radius:999px;padding:13px 28px;min-height:44px;transition:transform .15s ease, box-shadow .25s ease}
    button:hover{box-shadow:0 12px 30px rgba(34,197,94,.3)}
    button:active{transform:scale(.97)}
    .links{margin-top:18px;display:flex;gap:14px}
    .links a{color:#bccbb9;font-size:12px;text-decoration:none;border-bottom:1px dashed rgba(188,203,185,.3);padding-bottom:1px}
    .dot{width:8px;height:8px;border-radius:50%;background:#ff8b7c;display:inline-block;vertical-align:middle;margin-right:6px;box-shadow:0 0 12px rgba(255,139,124,.55)}
    .status{font-size:12px;color:#bccbb9;margin-top:6px}
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="logo" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#003915"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
    </div>
    <h1>You're offline</h1>
    <p><span class="dot" aria-hidden="true"></span><span class="status">No internet connection</span><br/>Some FitLife features need a connection. We'll bring you back as soon as you're online.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="links">
      <a href="/">Home</a>
      <a href="javascript:history.back()">Back</a>
    </div>
  </main>

  <script>
    // Auto-reload when the network is back
    window.addEventListener('online', () => setTimeout(() => location.reload(), 600));
  </script>
</body>
</html>
