<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e150e">
  <meta name="color-scheme" content="dark light">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitLife">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="FitLife — AI-Powered Fitness & Nutrition Platform. Personalized meal plans, intelligent tracking, and real-time AI coaching.">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FitLife">
  <meta property="og:title" content="FitLife | AI-Powered Fitness & Nutrition">
  <meta property="og:description" content="Your AI-Powered Performance Partner — personalized nutrition plans, AI meal scanner, smart recipes.">
  <meta property="og:image" content="/assets/icons/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FitLife | AI-Powered Performance">
  <meta name="twitter:description" content="Your AI-Powered Performance Partner — personalized nutrition plans, AI meal scanner, smart recipes.">
  <meta name="twitter:image" content="/assets/icons/icon-512.png">

  <title>FitLife | AI-Powered Performance</title>

  <!-- PWA / Icons -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">

  <!-- DNS Prefetch & Preconnect -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CDN (with FitLife theme) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'surface': '#0e150e',
            'surface-dim': '#0e150e',
            'surface-bright': '#333b33',
            'surface-container-lowest': '#091009',
            'surface-container-low': '#161d16',
            'surface-container': '#1a221a',
            'surface-container-high': '#242c24',
            'surface-container-highest': '#2f372e',
            'on-surface': '#dce5d9',
            'on-surface-variant': '#bccbb9',
            'inverse-surface': '#dce5d9',
            'inverse-on-surface': '#2a322a',
            'outline': '#869585',
            'outline-variant': '#3d4a3d',
            'surface-tint': '#4ae176',
            'primary': '#4be277',
            'on-primary': '#003915',
            'primary-container': '#22c55e',
            'on-primary-container': '#004b1e',
            'inverse-primary': '#006e2f',
            'secondary': '#9ddf2e',
            'on-secondary': '#213600',
            'secondary-container': '#83c300',
            'on-secondary-container': '#304b00',
            'tertiary': '#ffb5ab',
            'on-tertiary': '#60130d',
            'tertiary-container': '#ff8b7c',
            'on-tertiary-container': '#76231b',
            'error': '#ffb4ab',
            'on-error': '#690005',
            'error-container': '#93000a',
            'on-error-container': '#ffdad6',
            'background': '#0e150e',
            'on-background': '#dce5d9',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    /* Base reset */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: #0e150e;
      color: #dce5d9;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-x: none;
      overscroll-behavior-y: auto;
      overflow-x: hidden;
      overflow-y: auto;
      width: 100%;
      max-width: 100vw;
      touch-action: pan-y pinch-zoom;
      -webkit-overflow-scrolling: touch;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    /* Responsive media */
    img, svg, video, canvas, audio, iframe, embed, object {
      max-width: 100%;
      height: auto;
      display: block;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button, [role="button"], a, input[type="submit"], input[type="button"] { touch-action: manipulation; }

    /* Touch targets >= 44px */
    button:not(.fl-no-min), [role="button"]:not(.fl-no-min) { min-height: 44px; min-width: 44px; }

    /* App root */
    #app {
      transition: opacity 0.18s ease-out, transform 0.18s ease-out;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      overflow-x: hidden;
      overflow-y: visible;
      touch-action: pan-y pinch-zoom;
      -webkit-overflow-scrolling: touch;
    }

    /* Safe-area helpers for notched devices */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 8px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    .pl-safe { padding-left: env(safe-area-inset-left, 0px); }
    .pr-safe { padding-right: env(safe-area-inset-right, 0px); }

    /* Focus accessibility */
    :focus-visible {
      outline: 2px solid #22c55e;
      outline-offset: 2px;
      border-radius: 6px;
    }
    button:focus:not(:focus-visible), input:focus:not(:focus-visible), select:focus:not(:focus-visible), textarea:focus:not(:focus-visible) {
      outline: none;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3d4a3d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #5a6a59; }

    /* Animations */
    @keyframes fade-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

    /* Accessibility helpers */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }
    .skip-link {
      position: absolute; top: -100px; left: 8px; z-index: 10000;
      background: #22c55e; color: #003915; padding: 8px 14px; border-radius: 8px;
      text-decoration: none; font-weight: 700;
    }
    .skip-link:focus { top: 8px; }

    ::selection { background: rgba(34,197,94,0.3); color: #dce5d9; }

    /* Autofill */
    input:-webkit-autofill, textarea:-webkit-autofill, select:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #091009 inset !important;
      -webkit-text-fill-color: #dce5d9 !important;
      caret-color: #dce5d9;
    }

    /* iOS prevents zoom on focus when font-size >= 16px */
    input, select, textarea { font-size: 16px; }
    @media (min-width: 768px) { input, select, textarea { font-size: 14px; } }

    /* Loading dots (boot) */
    .fl-boot-dot { animation: boot-bounce 1.2s ease-in-out infinite; }
    @keyframes boot-bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-surface text-on-surface">
  <a href="#app" class="skip-link">Skip to content</a>

  <div id="app" role="main" aria-live="polite">
    <!-- Boot splash (replaced once app.js mounts) -->
    <div class="min-h-screen flex items-center justify-center" style="min-height:100dvh;">
      <div class="flex flex-col items-center gap-4">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-container to-primary flex items-center justify-center" style="box-shadow:0 0 40px rgba(34,197,94,0.25);">
          <span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
        </div>
        <div class="flex gap-1.5" aria-hidden="true">
          <div class="w-1.5 h-1.5 rounded-full bg-primary fl-boot-dot" style="animation-delay:0ms"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-primary fl-boot-dot" style="animation-delay:140ms"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-primary fl-boot-dot" style="animation-delay:280ms"></div>
        </div>
        <p class="sr-only">Loading FitLife…</p>
      </div>
    </div>
  </div>

  <noscript>
    <div style="padding:24px; text-align:center; color:#dce5d9;">
      <h2>JavaScript is required</h2>
      <p>FitLife is a JavaScript-powered app. Please enable JavaScript in your browser.</p>
    </div>
  </noscript>

  <script type="module" src="/src/app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (reg) {
            function announceUpdate(worker) {
              if (!worker) return;
              worker.addEventListener('statechange', function () {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.info('[FitLife] Update ready. It will apply after the app is reopened.');
                  window.dispatchEvent(new CustomEvent('fitlife-sw-update-ready'));
                }
              });
            }

            if (reg.waiting) {
              window.dispatchEvent(new CustomEvent('fitlife-sw-update-ready'));
            }

            reg.addEventListener('updatefound', function () {
              announceUpdate(reg.installing);
            });
          })
          .catch(function (err) { console.warn('[FitLife] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
