<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e150e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitLife">
  <meta name="description" content="FitLife - AI-Powered Fitness & Nutrition Platform. Personalized meal plans, intelligent tracking, and real-time insights.">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <title>FitLife | AI-Powered Performance</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">

  <!-- DNS Prefetch & Preconnect for external services -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'surface': '#0e150e',
            'surface-dim': '#0e150e',
            'surface-bright': '#333b33',
            'surface-container-lowest': '#091009',
            'surface-container-low': '#161d16',
            'surface-container': '#1a221a',
            'surface-container-high': '#242c24',
            'surface-container-highest': '#2f372e',
            'on-surface': '#dce5d9',
            'on-surface-variant': '#bccbb9',
            'inverse-surface': '#dce5d9',
            'inverse-on-surface': '#2a322a',
            'outline': '#869585',
            'outline-variant': '#3d4a3d',
            'surface-tint': '#4ae176',
            'primary': '#4be277',
            'on-primary': '#003915',
            'primary-container': '#22c55e',
            'on-primary-container': '#004b1e',
            'inverse-primary': '#006e2f',
            'secondary': '#9ddf2e',
            'on-secondary': '#213600',
            'secondary-container': '#83c300',
            'on-secondary-container': '#304b00',
            'tertiary': '#ffb5ab',
            'on-tertiary': '#60130d',
            'tertiary-container': '#ff8b7c',
            'on-tertiary-container': '#76231b',
            'error': '#ffb4ab',
            'on-error': '#690005',
            'error-container': '#93000a',
            'on-error-container': '#ffdad6',
            'background': '#0e150e',
            'on-background': '#dce5d9',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    /* Base styles */
    * { -webkit-tap-highlight-color: transparent; }
    html, body { 
      margin: 0; padding: 0; 
      background: #0e150e; 
      color: #dce5d9;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    
    /* Safe area padding for notched devices */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 8px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

    /* Page transitions */
    #app {
      transition: opacity 0.12s ease-out, transform 0.12s ease-out;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Focus visible for accessibility */
    :focus-visible {
      outline: 2px solid #22c55e;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3d4a3d; border-radius: 4px; }

    /* Animations */
    @keyframes fade-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    /* Screen reader only (accessibility) */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }

    /* Selection */
    ::selection { background: rgba(34, 197, 94, 0.3); color: #dce5d9; }

    /* Input autofill */
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #091009 inset !important;
      -webkit-text-fill-color: #dce5d9 !important;
    }
  </style>
</head>
<body class="bg-surface text-on-surface">
  <div id="app">
    <!-- Initial loading state -->
    <div class="min-h-screen flex items-center justify-center">
      <div class="flex flex-col items-center gap-4">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-container to-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
        </div>
        <div class="flex gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 0ms;"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 150ms;"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 300ms;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('[FitLife] SW registered:', reg.scope))
          .catch(err => console.warn('[FitLife] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
